version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 20
    versioning-strategy: increase
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore(deps)
    groups:
      wxt:
        patterns:
          - "wxt"
          - "@wxt-dev/*"
      all-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "wxt"
          - "@wxt-dev/*"
        update-types:
          - minor
          - patch
      major:
        patterns:
          - "*"
        exclude-patterns:
          - "wxt"
          - "@wxt-dev/*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(deps)
    groups:
      actions:
        patterns:
          - "*"
